# ── shell: start tmux with default sessions ─────────────────
# [terminal.shell]
# program = "sh"
# args = ["-c", "exec \"$HOME/.config/tmux/launch_git.sh\""]

[[keyboard.bindings]]
key = "G"
mods = "Control|Shift"
chars = "\u001B[6001~"

# Ctrl+Shift+C: compile/shell popup
# (overrides Alacritty's default copy binding; tmux copy-mode still works)
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
chars = "\u001B[6002~"
# ── font ─────────────────────────────────────────────────────
[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

# ── window ───────────────────────────────────────────────────
[window]
title = "✦ terminal"
dynamic_title = true
decorations = "None"
opacity = 0.92
padding = { x = 8, y = 8 }
dynamic_padding = true

# ── colors (catppuccin mocha) ────────────────────────────────
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"
