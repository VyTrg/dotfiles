# always start with 'main'
set -g destroy-unattached off
set-hook -g client-detached 'run-shell "if [ $(tmux list-clients | wc -l) -eq 0 ]; then tmux kill-server; fi"'

# lazygit popup
set -s command-alias[100] git='display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit'

# number windows and panes from 1 
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


# pass the inner shell's title through to the terminal window
set -g set-titles on
set -g set-titles-string "#{pane_title}"

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#6c7086"

# list session tabs
set -g status-left "#{S:#{?#{==:#{session_name},#{client_session}},#{?client_prefix,#[bg=#f38ba8],#[bg=#a6e3a1]}#[fg=#1e1e2e]#[bold],#[bg=#313244]#[fg=#cdd6f4]} #{session_name} #[bg=default]#[nobold] }"
set -g status-left-length 100
set -g status-right ""

# catppuccin mocha tabs color
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#1e1e2e,bg=#89b4fa] #I #[fg=#cdd6f4,bg=#313244] #W "
setw -g window-status-current-format "#[fg=colour232,bg=#fab387] #I #[fg=colour255,bg=colour237] #{s|.*/([^/]+/[^/]+)$|\\1|:pane_current_path} "

# scrolling in session
set -g mouse on

# compile popup (only in dev session)
set -s command-alias[101] cm='display-popup -E -w 90% -h 90% -d "#{pane_current_path}"'

# new-window keybindings — alacritty sends these sequences for Ctrl+Shift+G / Ctrl+Shift+C
set -s user-keys[0] "\e[6001~"
set -s user-keys[1] "\e[6002~"
bind -n User0 new-window -c "#{pane_current_path}" lazygit
bind -n User1 new-window -c "#{pane_current_path}"
